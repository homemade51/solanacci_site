<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0B1220" />
  <title>SOLANAcci - Open Payment in Phantom</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0B1220;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100%;
    }
    .wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .box {
      max-width: 420px;
    }
    .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .desc {
      font-size: 14px;
      opacity: 0.9;
      line-height: 1.6;
    }
  </style>
  <script>
    (function () {
      var q = new URLSearchParams(window.location.search);
      var payId = q.get("payId") || "";
      var product = q.get("product") || "";
      var payUrl = q.get("payUrl") || "";

      var target = new URL("/play/", window.location.origin);
      target.searchParams.set("shopInPhantom", "1");
      target.searchParams.set("autopay", "1");
      target.searchParams.set("payId", payId);
      target.searchParams.set("product", product);
      target.searchParams.set("payUrl", payUrl);

      window.location.replace(target.toString());
    })();
  </script>
</head>
<body>
  <div class="wrap">
    <div class="box">
      <div class="title">Opening Payment in Phantom...</div>
      <div class="desc">Phantom 内で支払いを起動しています…</div>
    </div>
  </div>
</body>
</html>
